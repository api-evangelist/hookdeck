naftiko: "1.0.0-alpha2"

info:
  title: Hookdeck Spec-Driven Destination
  description: >-
    Auto-registers a Hookdeck Destination from a Naftiko capability's REST
    expose. When a Naftiko engineer deploys a webhook-handler capability,
    this capability authors the matching Hookdeck Destination — URL,
    auth header, retry policy, rate limit — so the public webhook URL
    Hookdeck fronts and the Naftiko-built handler behind it stay in
    lockstep. Eliminates the manual "point this thing at that thing"
    plumbing between capability deploys and gateway config.
  tags:
    - Naftiko
    - Hookdeck
    - Partnership
    - Webhooks
    - Auto-Registration
    - Spec-Driven
  created: '2026-05-21'
  modified: '2026-05-21'

binds:
  - namespace: hookdeck-env
    keys:
      HOOKDECK_API_TOKEN: HOOKDECK_API_TOKEN

capability:
  consumes:
    - namespace: hookdeck
      type: http
      baseUri: https://api.hookdeck.com/2025-07-01
      authentication:
        type: bearer
        token: '{{HOOKDECK_API_TOKEN}}'
      resources:
        - name: destinations
          path: /destinations
          operations:
            - name: create-destination
              method: POST
        - name: destination
          path: /destinations/{{id}}
          operations:
            - name: update-destination
              method: PUT
              inputParameters:
                - name: id
                  in: path
                  required: true
            - name: delete-destination
              method: DELETE
              inputParameters:
                - name: id
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: hookdeck-spec-driven-destination-rest
      resources:
        - name: destinations
          path: /destinations
          operations:
            - name: create-destination
              method: POST
              call: hookdeck.create-destination
        - name: destination
          path: /destinations/{id}
          operations:
            - name: update-destination
              method: PUT
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.update-destination
            - name: delete-destination
              method: DELETE
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.delete-destination

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: hookdeck-spec-driven-destination-mcp
      description: MCP server for agents auto-registering Naftiko-built webhook handlers as Hookdeck Destinations.
      tools:
        - name: create-destination
          description: Create a Hookdeck Destination pointing at a Naftiko capability's REST expose URL. Use after a capability deploy when its container port + URL are known.
          hints: { destructiveHint: false }
          call: hookdeck.create-destination
        - name: update-destination
          description: Update a Hookdeck Destination (URL, retry policy, rate limit) — used when a Naftiko capability is redeployed at a new URL or version.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.update-destination
        - name: delete-destination
          description: Delete a Hookdeck Destination — used when the corresponding Naftiko capability is decommissioned.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.delete-destination
