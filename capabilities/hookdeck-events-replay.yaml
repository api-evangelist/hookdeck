naftiko: "1.0.0-alpha2"

info:
  title: Hookdeck Events Replay
  description: >-
    Operational tooling for Naftiko-built webhook handlers — fetch, retry,
    cancel, and mute individual Hookdeck Events. Surfaces the event-by-id
    primitives that on-call engineers and incident-response agents need
    when a Naftiko capability has missed or failed a delivery and a
    surgical replay is required (no bulk operations here — see
    hookdeck-bulk-retry-orchestrator for batched workflows).
  tags:
    - Naftiko
    - Hookdeck
    - Partnership
    - Webhooks
    - Replay
    - Incident Response
  created: '2026-05-21'
  modified: '2026-05-21'

binds:
  - namespace: hookdeck-env
    keys:
      HOOKDECK_API_TOKEN: HOOKDECK_API_TOKEN

capability:
  consumes:
    - namespace: hookdeck
      type: http
      baseUri: https://api.hookdeck.com/2025-07-01
      authentication:
        type: bearer
        token: '{{HOOKDECK_API_TOKEN}}'
      resources:
        - name: events
          path: /events
          operations:
            - name: list-events
              method: GET
        - name: event
          path: /events/{{id}}
          operations:
            - name: get-event
              method: GET
              inputParameters:
                - name: id
                  in: path
                  required: true
        - name: event-retry
          path: /events/{{id}}/retry
          operations:
            - name: retry-event
              method: POST
              inputParameters:
                - name: id
                  in: path
                  required: true
        - name: event-cancel
          path: /events/{{id}}/cancel
          operations:
            - name: cancel-event
              method: POST
              inputParameters:
                - name: id
                  in: path
                  required: true
        - name: event-mute
          path: /events/{{id}}/mute
          operations:
            - name: mute-event
              method: POST
              inputParameters:
                - name: id
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: hookdeck-events-replay-rest
      resources:
        - name: events
          path: /events
          operations:
            - name: list-events
              method: GET
              call: hookdeck.list-events
        - name: event
          path: /events/{id}
          operations:
            - name: get-event
              method: GET
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.get-event
        - name: event-actions
          path: /events/{id}/{action}
          operations:
            - name: retry-event
              method: POST
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.retry-event
            - name: cancel-event
              method: POST
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.cancel-event
            - name: mute-event
              method: POST
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.mute-event

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: hookdeck-events-replay-mcp
      description: MCP server for incident-response agents performing surgical event replay against Hookdeck.
      tools:
        - name: list-events
          description: List recent Hookdeck Events (with optional status / destination / source filters).
          hints: { readOnly: true }
          call: hookdeck.list-events
        - name: get-event
          description: Fetch a single Hookdeck Event by id (payload, attempts, status, last error).
          hints: { readOnly: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.get-event
        - name: retry-event
          description: Force a new delivery attempt for a single failed Hookdeck Event.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.retry-event
        - name: cancel-event
          description: Cancel future delivery attempts for a Hookdeck Event (stop the retry loop).
          hints: { destructiveHint: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.cancel-event
        - name: mute-event
          description: Mute issue notifications for a Hookdeck Event without canceling it.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.mute-event
