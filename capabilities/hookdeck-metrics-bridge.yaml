naftiko: "1.0.0-alpha2"

info:
  title: Hookdeck Metrics Bridge
  description: >-
    Pulls Hookdeck delivery metrics — event success/failure counts, attempt
    latency, queue depth, per-connection throughput — and re-exposes them
    through Naftiko REST + MCP so the Naftiko governance dashboard, the
    Fleet inspector, and incident-response agents can see event-plane
    telemetry alongside capability-plane telemetry. Closes the
    "what happened upstream of my Naftiko capability" gap.
  tags:
    - Naftiko
    - Hookdeck
    - Partnership
    - Webhooks
    - Metrics
    - Observability
  created: '2026-05-21'
  modified: '2026-05-21'

binds:
  - namespace: hookdeck-env
    keys:
      HOOKDECK_API_TOKEN: HOOKDECK_API_TOKEN

capability:
  consumes:
    - namespace: hookdeck
      type: http
      baseUri: https://api.hookdeck.com/2025-07-01
      authentication:
        type: bearer
        token: '{{HOOKDECK_API_TOKEN}}'
      resources:
        - name: events-metrics
          path: /metrics/events
          operations:
            - name: get-events-metrics
              method: GET
        - name: attempts-metrics
          path: /metrics/attempts
          operations:
            - name: get-attempts-metrics
              method: GET
        - name: queue-depth-metrics
          path: /metrics/queue-depth
          operations:
            - name: get-queue-depth-metrics
              method: GET
        - name: connections-metrics
          path: /metrics/connections
          operations:
            - name: get-connections-metrics
              method: GET

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: hookdeck-metrics-bridge-rest
      resources:
        - name: events-metrics
          path: /metrics/events
          operations:
            - name: get-events-metrics
              method: GET
              call: hookdeck.get-events-metrics
        - name: attempts-metrics
          path: /metrics/attempts
          operations:
            - name: get-attempts-metrics
              method: GET
              call: hookdeck.get-attempts-metrics
        - name: queue-depth-metrics
          path: /metrics/queue-depth
          operations:
            - name: get-queue-depth-metrics
              method: GET
              call: hookdeck.get-queue-depth-metrics
        - name: connections-metrics
          path: /metrics/connections
          operations:
            - name: get-connections-metrics
              method: GET
              call: hookdeck.get-connections-metrics

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: hookdeck-metrics-bridge-mcp
      description: MCP server for observability agents pulling Hookdeck event-plane metrics into Naftiko governance dashboards.
      tools:
        - name: get-events-metrics
          description: Pull Hookdeck event count metrics (success / failure / pending / muted by time bucket).
          hints: { readOnly: true }
          call: hookdeck.get-events-metrics
        - name: get-attempts-metrics
          description: Pull Hookdeck delivery-attempt metrics (latency percentiles, success rate, retry counts).
          hints: { readOnly: true }
          call: hookdeck.get-attempts-metrics
        - name: get-queue-depth-metrics
          description: Pull Hookdeck queue-depth metrics (backlog size per destination — early signal that a Naftiko capability is falling behind).
          hints: { readOnly: true }
          call: hookdeck.get-queue-depth-metrics
        - name: get-connections-metrics
          description: Pull Hookdeck per-connection throughput metrics — useful for FinOps cost attribution across Naftiko capability endpoints.
          hints: { readOnly: true }
          call: hookdeck.get-connections-metrics
