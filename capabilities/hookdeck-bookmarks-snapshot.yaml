naftiko: "1.0.0-alpha2"

info:
  title: Hookdeck Bookmarks Snapshot
  description: >-
    Surface Hookdeck Bookmarks — named snapshots of the event stream that
    serve as replay starting points — so audit/replay capabilities built
    on Naftiko can pin a "rebuild from this point" cursor. Useful when a
    Naftiko-built handler needs to backfill state after a downstream
    outage or when a compliance audit needs to prove the exact set of
    events processed between two timestamps.
  tags:
    - Naftiko
    - Hookdeck
    - Partnership
    - Webhooks
    - Bookmarks
    - Audit
    - Replay
  created: '2026-05-21'
  modified: '2026-05-21'

binds:
  - namespace: hookdeck-env
    keys:
      HOOKDECK_API_TOKEN: HOOKDECK_API_TOKEN

capability:
  consumes:
    - namespace: hookdeck
      type: http
      baseUri: https://api.hookdeck.com/2025-07-01
      authentication:
        type: bearer
        token: '{{HOOKDECK_API_TOKEN}}'
      resources:
        - name: bookmarks
          path: /bookmarks
          operations:
            - name: list-bookmarks
              method: GET
            - name: create-bookmark
              method: POST
        - name: bookmark
          path: /bookmarks/{{id}}
          operations:
            - name: get-bookmark
              method: GET
              inputParameters:
                - name: id
                  in: path
                  required: true
            - name: delete-bookmark
              method: DELETE
              inputParameters:
                - name: id
                  in: path
                  required: true
        - name: bookmark-trigger
          path: /bookmarks/{{id}}/trigger
          operations:
            - name: trigger-bookmark
              method: POST
              inputParameters:
                - name: id
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: hookdeck-bookmarks-snapshot-rest
      resources:
        - name: bookmarks
          path: /bookmarks
          operations:
            - name: list-bookmarks
              method: GET
              call: hookdeck.list-bookmarks
            - name: create-bookmark
              method: POST
              call: hookdeck.create-bookmark
        - name: bookmark
          path: /bookmarks/{id}
          operations:
            - name: get-bookmark
              method: GET
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.get-bookmark
            - name: delete-bookmark
              method: DELETE
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.delete-bookmark
        - name: bookmark-trigger
          path: /bookmarks/{id}/trigger
          operations:
            - name: trigger-bookmark
              method: POST
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.trigger-bookmark

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: hookdeck-bookmarks-snapshot-mcp
      description: MCP server for audit/replay agents working with Hookdeck Bookmarks.
      tools:
        - name: list-bookmarks
          description: List every Hookdeck Bookmark (named replay cursor).
          hints: { readOnly: true }
          call: hookdeck.list-bookmarks
        - name: get-bookmark
          description: Fetch a single Hookdeck Bookmark by id (event id, filter, label).
          hints: { readOnly: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.get-bookmark
        - name: create-bookmark
          description: Create a Hookdeck Bookmark — typically just before a risky deploy of a Naftiko-built handler so the rollback point is captured.
          hints: { destructiveHint: false }
          call: hookdeck.create-bookmark
        - name: trigger-bookmark
          description: Trigger a Hookdeck Bookmark replay (re-emit the captured event set to its destinations).
          hints: { destructiveHint: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.trigger-bookmark
        - name: delete-bookmark
          description: Delete a Hookdeck Bookmark.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.delete-bookmark
