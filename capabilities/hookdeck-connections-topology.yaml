naftiko: "1.0.0-alpha2"

info:
  title: Hookdeck Connections Topology
  description: >-
    Pulls Hookdeck Connection records — the source → destination edges that
    form the live event topology — and re-exposes them through Naftiko REST
    and MCP. Used by Naftiko Fleet to render webhook-flow graphs, by agents
    answering "which source feeds which Naftiko capability", and by governance
    rules that audit unauthorized routing changes.
  tags:
    - Naftiko
    - Hookdeck
    - Partnership
    - Webhooks
    - Topology
    - Governance
  created: '2026-05-21'
  modified: '2026-05-21'

binds:
  - namespace: hookdeck-env
    keys:
      HOOKDECK_API_TOKEN: HOOKDECK_API_TOKEN

capability:
  consumes:
    - namespace: hookdeck
      type: http
      baseUri: https://api.hookdeck.com/2025-07-01
      authentication:
        type: bearer
        token: '{{HOOKDECK_API_TOKEN}}'
      resources:
        - name: connections
          path: /connections
          operations:
            - name: list-connections
              method: GET
        - name: connection
          path: /connections/{{id}}
          operations:
            - name: get-connection
              method: GET
              inputParameters:
                - name: id
                  in: path
                  required: true
            - name: pause-connection
              method: PUT
            - name: unpause-connection
              method: PUT

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: hookdeck-connections-topology-rest
      resources:
        - name: connections
          path: /connections
          operations:
            - name: list-connections
              method: GET
              call: hookdeck.list-connections
        - name: connection
          path: /connections/{id}
          operations:
            - name: get-connection
              method: GET
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.get-connection

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: hookdeck-connections-topology-mcp
      description: MCP server for agents introspecting the live Hookdeck source → destination topology.
      tools:
        - name: list-connections
          description: List every Hookdeck Connection (Source → Destination edge with retry policy + filter + transformation).
          hints: { readOnly: true }
          call: hookdeck.list-connections
        - name: get-connection
          description: Fetch a single Hookdeck Connection by id (full source + destination + middleware chain).
          hints: { readOnly: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.get-connection
