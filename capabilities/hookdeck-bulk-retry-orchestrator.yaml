naftiko: "1.0.0-alpha2"

info:
  title: Hookdeck Bulk Retry Orchestrator
  description: >-
    Orchestrates Hookdeck bulk operations — retry, cancel, ignored-events
    retry, and bulk-requests retry — through Naftiko MCP tools so an
    incident-response agent can recover an outage with one call instead
    of ten thousand. Designed for the "Naftiko capability behind a
    Hookdeck destination came back up at 3am and we have 50,000 backed-up
    events" scenario. Read kicks off the job; status check returns
    progress; cancel halts it.
  tags:
    - Naftiko
    - Hookdeck
    - Partnership
    - Webhooks
    - Bulk Operations
    - Incident Response
  created: '2026-05-21'
  modified: '2026-05-21'

binds:
  - namespace: hookdeck-env
    keys:
      HOOKDECK_API_TOKEN: HOOKDECK_API_TOKEN

capability:
  consumes:
    - namespace: hookdeck
      type: http
      baseUri: https://api.hookdeck.com/2025-07-01
      authentication:
        type: bearer
        token: '{{HOOKDECK_API_TOKEN}}'
      resources:
        - name: bulk-retry-events
          path: /bulk/events/retry
          operations:
            - name: create-bulk-events-retry
              method: POST
        - name: bulk-retry-events-status
          path: /bulk/events/retry/{{id}}
          operations:
            - name: get-bulk-events-retry
              method: GET
              inputParameters:
                - name: id
                  in: path
                  required: true
            - name: cancel-bulk-events-retry
              method: DELETE
              inputParameters:
                - name: id
                  in: path
                  required: true
        - name: bulk-cancel-events
          path: /bulk/events/cancel
          operations:
            - name: create-bulk-events-cancel
              method: POST
        - name: bulk-retry-ignored
          path: /bulk/ignored-events/retry
          operations:
            - name: create-bulk-ignored-retry
              method: POST
        - name: bulk-retry-requests
          path: /bulk/requests/retry
          operations:
            - name: create-bulk-requests-retry
              method: POST

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: hookdeck-bulk-retry-orchestrator-rest
      resources:
        - name: bulk-retry-events
          path: /bulk/events/retry
          operations:
            - name: create-bulk-events-retry
              method: POST
              call: hookdeck.create-bulk-events-retry
        - name: bulk-retry-events-status
          path: /bulk/events/retry/{id}
          operations:
            - name: get-bulk-events-retry
              method: GET
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.get-bulk-events-retry
            - name: cancel-bulk-events-retry
              method: DELETE
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.cancel-bulk-events-retry
        - name: bulk-cancel-events
          path: /bulk/events/cancel
          operations:
            - name: create-bulk-events-cancel
              method: POST
              call: hookdeck.create-bulk-events-cancel
        - name: bulk-retry-ignored
          path: /bulk/ignored-events/retry
          operations:
            - name: create-bulk-ignored-retry
              method: POST
              call: hookdeck.create-bulk-ignored-retry
        - name: bulk-retry-requests
          path: /bulk/requests/retry
          operations:
            - name: create-bulk-requests-retry
              method: POST
              call: hookdeck.create-bulk-requests-retry

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: hookdeck-bulk-retry-orchestrator-mcp
      description: MCP server for incident-response agents orchestrating Hookdeck bulk recovery jobs.
      tools:
        - name: create-bulk-events-retry
          description: Kick off a bulk-retry job for failed Hookdeck events matching a filter (use after a downstream Naftiko capability recovers from an outage).
          hints: { destructiveHint: false }
          call: hookdeck.create-bulk-events-retry
        - name: get-bulk-events-retry
          description: Check status of a Hookdeck bulk-retry job (progress, succeeded count, remaining count).
          hints: { readOnly: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.get-bulk-events-retry
        - name: cancel-bulk-events-retry
          description: Cancel a running Hookdeck bulk-retry job.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.cancel-bulk-events-retry
        - name: create-bulk-events-cancel
          description: Kick off a bulk-cancel job to stop the retry loop on a population of in-flight failed events.
          hints: { destructiveHint: true }
          call: hookdeck.create-bulk-events-cancel
        - name: create-bulk-ignored-retry
          description: Kick off a bulk-retry job for events Hookdeck previously ignored (filter or signature mismatch).
          hints: { destructiveHint: false }
          call: hookdeck.create-bulk-ignored-retry
        - name: create-bulk-requests-retry
          description: Kick off a bulk-retry job at the raw-request level (pre-event stage).
          hints: { destructiveHint: false }
          call: hookdeck.create-bulk-requests-retry
