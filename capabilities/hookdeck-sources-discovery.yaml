naftiko: "1.0.0-alpha2"

info:
  title: Hookdeck Sources Discovery
  description: >-
    Read-only discovery of Hookdeck Source resources (stable webhook ingress
    URLs). Surfaces every Source the project owns through Naftiko REST and MCP
    so Fleet inventory, agent troubleshooters, and capability authors can see
    which webhook ingress points feed Naftiko-built handlers downstream.
  tags:
    - Naftiko
    - Hookdeck
    - Partnership
    - Webhooks
    - Discovery
    - Event Gateway
  created: '2026-05-21'
  modified: '2026-05-21'

binds:
  - namespace: hookdeck-env
    description: Hookdeck project API key (Bearer auth).
    keys:
      HOOKDECK_API_TOKEN: HOOKDECK_API_TOKEN

capability:
  consumes:
    - namespace: hookdeck
      type: http
      baseUri: https://api.hookdeck.com/2025-07-01
      authentication:
        type: bearer
        token: '{{HOOKDECK_API_TOKEN}}'
      resources:
        - name: sources
          path: /sources
          operations:
            - name: list-sources
              method: GET
        - name: source
          path: /sources/{{id}}
          operations:
            - name: get-source
              method: GET
              inputParameters:
                - name: id
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: hookdeck-sources-discovery-rest
      description: REST surface for Hookdeck Source discovery.
      resources:
        - name: sources
          path: /sources
          operations:
            - name: list-sources
              method: GET
              call: hookdeck.list-sources
        - name: source
          path: /sources/{id}
          operations:
            - name: get-source
              method: GET
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.get-source

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: hookdeck-sources-discovery-mcp
      description: MCP server for agents introspecting Hookdeck Source inventory.
      tools:
        - name: list-sources
          description: List every Hookdeck Source in the connected project (stable webhook ingress URLs).
          hints: { readOnly: true }
          call: hookdeck.list-sources
        - name: get-source
          description: Fetch a single Hookdeck Source by id, including its URL, allowed methods, and verification config.
          hints: { readOnly: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.get-source
