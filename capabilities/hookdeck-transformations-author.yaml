naftiko: "1.0.0-alpha2"

info:
  title: Hookdeck Transformations Author
  description: >-
    CRUD on Hookdeck Transformation records — the JavaScript snippets that
    normalize webhook payloads between the Source and the Destination.
    Lets a Naftiko capability publish a payload-normalization
    transformation upstream so that the downstream Naftiko-built handler
    receives canonical-shape JSON instead of vendor-specific schemas
    (Stripe → canonical, Shopify → canonical, etc.). Spec-driven
    authoring of edge transformations.
  tags:
    - Naftiko
    - Hookdeck
    - Partnership
    - Webhooks
    - Transformations
    - Spec-Driven
  created: '2026-05-21'
  modified: '2026-05-21'

binds:
  - namespace: hookdeck-env
    keys:
      HOOKDECK_API_TOKEN: HOOKDECK_API_TOKEN

capability:
  consumes:
    - namespace: hookdeck
      type: http
      baseUri: https://api.hookdeck.com/2025-07-01
      authentication:
        type: bearer
        token: '{{HOOKDECK_API_TOKEN}}'
      resources:
        - name: transformations
          path: /transformations
          operations:
            - name: list-transformations
              method: GET
            - name: create-transformation
              method: POST
        - name: transformation
          path: /transformations/{{id}}
          operations:
            - name: get-transformation
              method: GET
              inputParameters:
                - name: id
                  in: path
                  required: true
            - name: update-transformation
              method: PUT
              inputParameters:
                - name: id
                  in: path
                  required: true
            - name: delete-transformation
              method: DELETE
              inputParameters:
                - name: id
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: hookdeck-transformations-author-rest
      resources:
        - name: transformations
          path: /transformations
          operations:
            - name: list-transformations
              method: GET
              call: hookdeck.list-transformations
            - name: create-transformation
              method: POST
              call: hookdeck.create-transformation
        - name: transformation
          path: /transformations/{id}
          operations:
            - name: get-transformation
              method: GET
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.get-transformation
            - name: update-transformation
              method: PUT
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.update-transformation
            - name: delete-transformation
              method: DELETE
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.delete-transformation

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: hookdeck-transformations-author-mcp
      description: MCP server for agents authoring Hookdeck Transformations from Naftiko-published normalizers.
      tools:
        - name: list-transformations
          description: List Hookdeck Transformations attached to the project (with name + language + snippet preview).
          hints: { readOnly: true }
          call: hookdeck.list-transformations
        - name: get-transformation
          description: Fetch a single Hookdeck Transformation by id (full snippet + bindings).
          hints: { readOnly: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.get-transformation
        - name: create-transformation
          description: Create a new Hookdeck Transformation — typically a Naftiko-published normalizer (Stripe → canonical, Shopify → canonical).
          hints: { destructiveHint: false }
          call: hookdeck.create-transformation
        - name: update-transformation
          description: Update an existing Hookdeck Transformation (new normalizer version, schema migration).
          hints: { destructiveHint: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.update-transformation
        - name: delete-transformation
          description: Delete a Hookdeck Transformation (decommission a normalizer).
          hints: { destructiveHint: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.delete-transformation
