naftiko: "1.0.0-alpha2"

info:
  title: Hookdeck Integrations Catalog
  description: >-
    Surfaces Hookdeck's first-party Integrations metadata (Stripe, Shopify,
    Twilio, GitHub, SendGrid, etc.) so Naftiko's capability discovery can
    cross-reference "which webhook providers Hookdeck already speaks
    natively" against "which Naftiko capabilities expose handlers for
    those providers". Closes the catalog loop — agents and developers can
    answer "is there a ready-to-go Hookdeck → Naftiko path for this
    provider" without leaving the MCP surface.
  tags:
    - Naftiko
    - Hookdeck
    - Partnership
    - Integrations
    - Catalog
    - Discovery
  created: '2026-05-21'
  modified: '2026-05-21'

binds:
  - namespace: hookdeck-env
    keys:
      HOOKDECK_API_TOKEN: HOOKDECK_API_TOKEN

capability:
  consumes:
    - namespace: hookdeck
      type: http
      baseUri: https://api.hookdeck.com/2025-07-01
      authentication:
        type: bearer
        token: '{{HOOKDECK_API_TOKEN}}'
      resources:
        - name: integrations
          path: /integrations
          operations:
            - name: list-integrations
              method: GET
        - name: integration
          path: /integrations/{{id}}
          operations:
            - name: get-integration
              method: GET
              inputParameters:
                - name: id
                  in: path
                  required: true
        - name: integration-setup
          path: /integrations/{{id}}/setup
          operations:
            - name: get-integration-setup
              method: GET
              inputParameters:
                - name: id
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: hookdeck-integrations-catalog-rest
      resources:
        - name: integrations
          path: /integrations
          operations:
            - name: list-integrations
              method: GET
              call: hookdeck.list-integrations
        - name: integration
          path: /integrations/{id}
          operations:
            - name: get-integration
              method: GET
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.get-integration
        - name: integration-setup
          path: /integrations/{id}/setup
          operations:
            - name: get-integration-setup
              method: GET
              inputParameters:
                - { name: id, in: path, type: string, required: true }
              call: hookdeck.get-integration-setup

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: hookdeck-integrations-catalog-mcp
      description: MCP server for discovery agents cross-referencing the Hookdeck integrations catalog against Naftiko capabilities.
      tools:
        - name: list-integrations
          description: List every first-party Hookdeck Integration (Stripe, Shopify, GitHub, Twilio, SendGrid, etc.).
          hints: { readOnly: true }
          call: hookdeck.list-integrations
        - name: get-integration
          description: Fetch a single Hookdeck Integration by id (provider name, supported event types, verification requirements).
          hints: { readOnly: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.get-integration
        - name: get-integration-setup
          description: Get the setup-template for a Hookdeck Integration (URL, signing secret, header verification config) — used to scaffold a matching Naftiko capability handler.
          hints: { readOnly: true }
          inputParameters:
            - { name: id, type: string, required: true }
          call: hookdeck.get-integration-setup
