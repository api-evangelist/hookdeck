naftiko: 1.0.0-alpha2
info:
  label: Buffer Shopify webhooks through Hookdeck for replay and audit
  description: Ingest every Shopify order, fulfillment, and refund webhook into a Hookdeck source so the events team can replay history, debug missed deliveries, and rate-limit fan-out into back-office systems.
  tags:
  - Hookdeck
  - Integration
  - Commerce
  - shopify
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    HOOKDECK_API_KEY: HOOKDECK_API_KEY
    SHOPIFY_API_KEY: SHOPIFY_API_KEY
capability:
  consumes:
  - type: http
    namespace: hookdeck
    baseUri: https://api.hookdeck.com/2025-07-01
    description: Hookdeck API operations consumed by this integration.
    resources:
    - name: sources
      path: /sources
      operations:
      - name: createsource
        method: POST
        description: Create a Hookdeck source URL for Shopify webhooks.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: events
      path: /events
      operations:
      - name: getevents
        method: GET
        description: List recent Shopify-origin events for replay or audit.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: events-id-retry
      path: /events/{id}/retry
      operations:
      - name: retryevent
        method: POST
        description: Replay a specific Shopify webhook event.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: shopify
    baseUri: https://yourshop.myshopify.com
    description: Shopify Admin API operations consumed by this integration.
    resources:
    - name: admin-api-2024-10-webhooks-json
      path: /admin/api/2024-10/webhooks.json
      operations:
      - name: createwebhook
        method: POST
        description: 'Shopify Admin API: createWebhook'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: hookdeck-shopify-mcp
    description: MCP adapter for the hookdeck-shopify integration.
    tools:
    - name: hookdeck_shopify
      description: Execute the hookdeck shopify integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: hookdeck-shopify-rest
    port: 8080
    description: REST adapter for the hookdeck-shopify integration.
    resources:
    - path: /hookdeck-shopify
      name: hookdeck-shopify
      description: REST surface for the hookdeck-shopify integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the hookdeck-shopify integration.
        call: hookdeck_shopify
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
