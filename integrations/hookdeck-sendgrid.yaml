naftiko: 1.0.0-alpha2
info:
  label: Capture SendGrid event webhooks with Hookdeck
  description: Point the SendGrid Event Webhook at a Hookdeck source, transform the payload with a Hookdeck transformation, and fan out delivery, open, click, and bounce events to both the data warehouse and the CRM.
  tags:
  - Hookdeck
  - Integration
  - Email
  - sendgrid
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    HOOKDECK_API_KEY: HOOKDECK_API_KEY
    SENDGRID_API_KEY: SENDGRID_API_KEY
capability:
  consumes:
  - type: http
    namespace: hookdeck
    baseUri: https://api.hookdeck.com/2025-07-01
    description: Hookdeck API operations consumed by this integration.
    resources:
    - name: sources
      path: /sources
      operations:
      - name: createsource
        method: POST
        description: Create a Hookdeck source for the SendGrid event webhook.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: transformations
      path: /transformations
      operations:
      - name: createtransformation
        method: POST
        description: Create a transformation that normalizes SendGrid event payloads.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: connections
      path: /connections
      operations:
      - name: createconnection
        method: POST
        description: Connect the SendGrid source to a normalized-events destination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: sendgrid
    baseUri: https://api.sendgrid.com
    description: SendGrid Web API operations consumed by this integration.
    resources:
    - name: v3-user-webhooks-event-settings
      path: /v3/user/webhooks/event/settings
      operations:
      - name: updateeventwebhooksettings
        method: PATCH
        description: 'SendGrid Web API: updateEventWebhookSettings'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: hookdeck-sendgrid-mcp
    description: MCP adapter for the hookdeck-sendgrid integration.
    tools:
    - name: hookdeck_sendgrid
      description: Execute the hookdeck sendgrid integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: hookdeck-sendgrid-rest
    port: 8080
    description: REST adapter for the hookdeck-sendgrid integration.
    resources:
    - path: /hookdeck-sendgrid
      name: hookdeck-sendgrid
      description: REST surface for the hookdeck-sendgrid integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the hookdeck-sendgrid integration.
        call: hookdeck_sendgrid
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
