              schema:
                $ref: '#/components/schemas/MetricsResponse'
      parameters:
      - in: query
        name: date_range
        schema:
          type: object
          properties:
            start:
              type: string
              format: date-time
              description: Start of the time range in ISO 8601 format
            end:
              type: string
              format: date-time
              description: End of the time range in ISO 8601 format
          required:
          - start
          - end
          additionalProperties: false
      - in: query
        name: granularity
        schema:
          type: string
          pattern: ^(\d+)(s|m|h|d|w|M)$
          nullable: true
          description: 'Time bucket granularity. Format: <number><unit> where unit is s (seconds 1-60), m (minutes 1-60),
            h (hours 1-24), d (days 1-31), w (weeks 1-4), M (months 1-12). Examples: 1s, 5m, 1h, 1d'
      - in: query
        name: filters
        schema:
          type: object
          properties:
            destination_id:
              type: string
              description: Filter by destination ID
          additionalProperties: false
      - in: query
        name: measures
        schema:
          type: array
          items:
            type: string
            enum:
            - count
          minItems: 1
          description: List of measures to aggregate (count)
      - in: query
        name: dimensions
        schema:
          type: array
          items:
            type: string
            enum:
            - destination_id
          description: List of dimensions to group by
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    basicAuth:
      type: http
      scheme: basic
  schemas:
    MetricsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MetricDataPoint'
          description: Array of metric data points
        metadata:
          type: object
          properties:
            granularity:
              type: string
              nullable: true
              description: Time granularity used in the query
            query_time_ms:
              type: number
              format: float
              description: Query execution time in milliseconds
            row_count:
              type: number
              format: float
              description: Number of rows returned
            row_limit:
              type: number
              format: float
              description: Maximum number of rows that can be returned
            truncated:
              type: boolean
              description: Whether results were truncated due to row limit
            warning:
              type: string
              description: Warning message if results were truncated
          additionalProperties: false
          description: Query metadata
      additionalProperties: false
      description: Metrics query response with data and metadata
    MetricDataPoint:
      type: object
      properties:
        time_bucket:
          type: string
          nullable: true
          description: Time bucket for the metric data point
        dimensions:
          type: object
          properties: {}
          additionalProperties:
            anyOf:
            - type: string
            - type: number
              format: float
            - type: boolean
          description: Key-value pairs of dimension names and their values.
        metrics:
          type: object
          properties: {}
          additionalProperties:
            type: number
            format: float
          description: Key-value pairs of metric names and their calculated values.
      additionalProperties: false
      description: A single metric data point with time bucket, dimensions, and metrics
