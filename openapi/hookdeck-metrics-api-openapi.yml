      description: Query queue depth metrics for destinations (pending events count and age)
      tags:
      - Metrics
      responses:
        '200':
          description: Queue depth metrics results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
      parameters:
      - in: query
        name: date_range
        schema:
          type: object
          properties:
            start:
              type: string
              format: date-time
              description: Start of the time range in ISO 8601 format
            end:
              type: string
              format: date-time
              description: End of the time range in ISO 8601 format
          required:
          - start
          - end
          additionalProperties: false
      - in: query
        name: granularity
        schema:
          type: string
          pattern: ^(\d+)(s|m|h|d|w|M)$
          nullable: true
          description: 'Time bucket granularity. Format: <number><unit> where unit is s (seconds 1-60), m (minutes 1-60),
            h (hours 1-24), d (days 1-31), w (weeks 1-4), M (months 1-12). Examples: 1s, 5m, 1h, 1d'
      - in: query
        name: filters
        schema:
          type: object
          properties:
            destination_id:
              type: string
              description: Filter by destination ID
          additionalProperties: false
      - in: query
        name: measures
        schema:
          type: array
          items:
            type: string
            enum:
            - max_depth
            - max_age
          minItems: 1
          description: Metrics to calculate
      - in: query
        name: dimensions
        schema:
          type: array
          items:
            type: string
            enum:
            - destination_id
          description: Dimensions to group by
  /metrics/transformations:
    get:
      operationId: queryTransformationMetrics
      summary: Query transformation execution metrics
      description: Query aggregated transformation execution metrics with time-based grouping and filtering
      tags:
      - Metrics
      responses:
        '200':
          description: Transformation metrics results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
      parameters:
      - in: query
        name: date_range
        schema:
          type: object
          properties:
            start:
              type: string
              format: date-time
              description: Start of the time range in ISO 8601 format
            end:
              type: string
              format: date-time
              description: End of the time range in ISO 8601 format
          required:
          - start
          - end
          additionalProperties: false
      - in: query
        name: granularity
        schema:
          type: string
          pattern: ^(\d+)(s|m|h|d|w|M)$
          nullable: true
          description: 'Time bucket granularity. Format: <number><unit> where unit is s (seconds 1-60), m (minutes 1-60),
            h (hours 1-24), d (days 1-31), w (weeks 1-4), M (months 1-12). Examples: 1s, 5m, 1h, 1d'
      - in: query
        name: filters
        schema:
          type: object
          properties:
            transformation_id:
              type: string
              description: Filter by transformation ID
            webhook_id:
              type: string
              description: Filter by connection ID
            log_level:
              type: string
              enum:
              - error
              - warn
              - info
              - debug
              - ''
              description: Filter by log level
            issue_id:
              type: string
              description: Filter by issue ID
          additionalProperties: false
      - in: query
        name: measures
        schema:
          type: array
          items:
            type: string
            enum:
            - count
            - successful_count
            - failed_count
            - error_rate
            - error_count
            - warn_count
            - info_count
            - debug_count
          minItems: 1
          description: Metrics to calculate
      - in: query
        name: dimensions
        schema:
          type: array
          items:
            type: string
            enum:
            - transformation_id
            - webhook_id
            - log_level
            - issue_id
          description: Dimensions to group by
  /metrics/events-pending-timeseries:
    get:
      operationId: queryEventsPendingTimeseriesMetrics
      summary: Query events pending timeseries metrics
      description: Query aggregated events pending timeseries metrics with time-based grouping and filtering
      tags:
      - Metrics
      responses:
        '200':
          description: Events pending timeseries metrics results
          content:
