          anyOf:
          - type: string
            format: date-time
            nullable: true
          - $ref: '#/components/schemas/Operators'
          description: Filter by date the bulk cancel was created
      - in: query
        name: id
        schema:
          anyOf:
          - type: string
            maxLength: 255
            description: Bulk cancel ID
          - type: array
            items:
              type: string
              maxLength: 255
              description: Bulk cancel ID
          description: Filter by bulk cancel IDs
      - in: query
        name: query
        schema:
          type: object
          properties:
            id:
              anyOf:
              - type: string
                maxLength: 255
                description: Event ID
              - type: array
                items:
                  type: string
                  maxLength: 255
                  description: Event ID
              description: Filter by event IDs
            status:
              anyOf:
              - $ref: '#/components/schemas/EventStatus'
              - type: array
                items:
                  $ref: '#/components/schemas/EventStatus'
              description: Lifecyle status of the event
            webhook_id:
              anyOf:
              - type: string
                maxLength: 255
                description: Connection (webhook) ID
              - type: array
                items:
                  type: string
                  maxLength: 255
                  description: Connection (webhook) ID
              description: Filter by connection (webhook) IDs
            destination_id:
              anyOf:
              - type: string
                maxLength: 255
                description: Destination ID
              - type: array
                items:
                  type: string
                  maxLength: 255
                  description: Destination ID
              description: Filter by destination IDs
            source_id:
              anyOf:
              - type: string
                maxLength: 255
                description: Source ID
              - type: array
                items:
                  type: string
                  maxLength: 255
                  description: Source ID
              description: Filter by source IDs
            attempts:
              anyOf:
              - type: integer
                minimum: 0
              - $ref: '#/components/schemas/Operators'
              description: Filter by number of attempts
            response_status:
              anyOf:
              - type: integer
                minimum: 200
                maximum: 600
              - $ref: '#/components/schemas/Operators'
              - type: array
                items:
                  type: integer
                  minimum: 200
                  maximum: 600
              nullable: true
              description: Filter by HTTP response status code
            successful_at:
              anyOf:
              - type: string
                format: date-time
              - $ref: '#/components/schemas/Operators'
              nullable: true
              description: Filter by `successful_at` date using a date operator
            created_at:
              anyOf:
              - type: string
                format: date-time
              - $ref: '#/components/schemas/Operators'
              description: Filter by `created_at` date using a date operator
            error_code:
              anyOf:
              - $ref: '#/components/schemas/AttemptErrorCodes'
              - type: array
                items:
                  $ref: '#/components/schemas/AttemptErrorCodes'
              description: Filter by error code code
            cli_id:
              anyOf:
              - type: string
              - type: object
                properties:
                  any:
                    type: boolean
                  all:
                    type: boolean
                additionalProperties: false
              - type: array
                items:
                  type: string
              nullable: true
              description: Filter by CLI IDs. `?[any]=true` operator for any CLI.
            last_attempt_at:
